<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel's Arcade</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="scene">
    <header class="hero">
      <h1>ANGEL'S ARCADE</h1>
      <p class="tagline">Wanna play, Sir?</p>

      <p style="color: hotpink; font-size: 28px; font-weight: bold; text-align: center; margin: 10px 0;">
        TEST VERSION LIVE
      </p>

      <div style="display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin:18px 0 14px;">
        <a class="enter-btn" href="#games">CREATE ROOM</a>
        <a
          href="/games/checkers/"
          style="display:inline-block; min-width:220px; padding:16px 28px; border-radius:999px; background:#8f7cff; color:white; text-decoration:none; font-weight:700; text-align:center;"
        >
          REJOIN ROOM
        </a>
      </div>

      <p class="featured-label">✦ Featured Games ✦</p>
    </header>

    <img
      class="fountain"
      src="assets/assetsfountain.png.png"
      alt="Emerald fountain"
    />

    <section class="games-layer" id="games" aria-label="Featured Games">
      <nav class="game-grid">
        <a href="/games/chess/">Chess</a>
        <a href="/games/checkers/">Checkers</a>
        <a href="/games/uno/">Uno</a>
        <a href="/games/scrabble/">Scrabble</a>
        <a href="/games/mancala/">Mancala</a>
        <a href="/games/cyvasse/">Cyvasse</a>
        <a href="/games/blackjack/">Blackjack</a>
        <a href="/games/dress-up/">Dress-Up</a>
      </nav>

      <p class="room-copy">Create a private room and send a link.</p>
      <p class="credit">Lovingly crafted by Angel ✦</p>
    </section>
  </main>
</body>
</html>
