<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel's Arcade</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .hero-button-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 18px 0 14px;
    }

    .hero-main-btn,
    .hero-secondary-btn {
      display: inline-block;
      min-width: 220px;
      text-align: center;
      text-decoration: none;
    }

    .hero-main-btn {
      class: enter-btn;
    }

    .hero-secondary-btn {
      padding: 16px 28px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8f7cff 0%, #6f5fe0 100%);
      color: #fff;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      box-shadow: 0 0 18px rgba(143, 124, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .hero-secondary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(143, 124, 255, 0.6);
    }
  </style>
</head>
<body>
  <main class="scene">
    <header class="hero">
      <h1>ANGEL'S ARCADE</h1>
      <p class="tagline">Wanna play, Sir?</p>

      <div class="hero-button-row">
        <a class="enter-btn hero-main-btn" href="#games">CREATE ROOM</a>
        <a class="hero-secondary-btn" href="/games/checkers/">REJOIN ROOM</a>
      </div>

      <p class="featured-label">✦ Featured Games ✦</p>
    </header>

    <img
      class="fountain"
      src="assets/assetsfountain.png.png"
      alt="Emerald fountain"
    />

    <section class="games-layer" id="games" aria-label="Featured Games">
      <nav class="game-grid">
        <a href="/games/chess/">Chess</a>
        <a href="/games/checkers/">Checkers</a>
        <a href="/games/uno/">Uno</a>
        <a href="/games/scrabble/">Scrabble</a>
        <a href="/games/mancala/">Mancala</a>
        <a href="/games/cyvasse/">Cyvasse</a>
        <a href="/games/blackjack/">Blackjack</a>
        <a href="/games/dress-up/">Dress-Up</a>
      </nav>

      <p class="room-copy">Create a private room and send a link.</p>
      <p class="credit">Lovingly crafted by Angel ✦</p>
    </section>
  </main>
</body>
</html>
