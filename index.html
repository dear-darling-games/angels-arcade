<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel's Arcade</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="scene">
    <header class="hero">
      <h1>ANGEL'S ARCADE</h1>
      <p class="tagline">Wanna play, Sir?</p>
      <a class="enter-btn" href="#games">ENTER GAME</a>
      <p class="featured-label">✦ Featured Games ✦</p>
    </header>

    <img
      class="fountain"
      src="assets/assetsfountain.png.png"
      alt="Emerald fountain"
    />

    <section class="games-layer" id="games" aria-label="Game Library">
      <nav class="game-grid">
        <a href="#">Chess</a>
        <a href="#">Checkers</a>
        <a href="#">Uno</a>
        <a href="#">Scrabble</a>
        <a href="#">Mancala</a>
        <a href="#">Cyvasse</a>
        <a href="#">Blackjack</a>
        <a href="#">Dress-Up</a>
      </nav>

      <p class="room-copy">Create a private room and send a link.</p>
      <p class="credit">Lovingly crafted by Angel ✦</p>
    </section>
  </main>
</body>
</html>
